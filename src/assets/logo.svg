<svg width="320" height="120" viewBox="0 0 320 120" fill="none" xmlns="http://www.w3.org/2000/svg" style="cursor: pointer;">
    <!-- Geometric emblem - abstract neural network node -->
    <g id="emblem">
        <!-- Outer frame -->
        <rect x="10" y="20" width="80" height="80" stroke="#1c1917" stroke-width="1.5" fill="#c9b6a9"/>
        <rect x="10" y="20" width="280" height="80" stroke="#1c1917" stroke-width="0.5" fill="none"/>
        
        <!-- Inner geometric pattern -->
        <circle cx="50" cy="60" r="15" fill="#1c1917"/>
        <circle cx="30" cy="40" r="5" fill="#57534e"/>
        <circle cx="70" cy="40" r="5" fill="#57534e"/>
        <circle cx="30" cy="80" r="5" fill="#57534e"/>
        <circle cx="70" cy="80" r="5" fill="#57534e"/>
        
        <!-- Connecting lines (neural network style) -->
        <line x1="30" y1="40" x2="50" y2="60" stroke="#78716c" stroke-width="1"/>
        <line x1="70" y1="40" x2="50" y2="60" stroke="#78716c" stroke-width="1"/>
        <line x1="30" y1="80" x2="50" y2="60" stroke="#78716c" stroke-width="1"/>
        <line x1="70" y1="80" x2="50" y2="60" stroke="#78716c" stroke-width="1"/>
    </g>
    
    <!-- Wordmark -->
    <g id="wordmark" transform="translate(110, 45)">
        <!-- HC in lighter weight -->
        <text x="0" y="30" font-family="serif" font-size="48" font-weight="300" fill="#1c1917" letter-spacing="-2">HCAIRE</text>
    </g>
</svg>